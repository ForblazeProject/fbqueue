name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: fbqueue
            asset_name: fbqueue-linux-x64.tar.gz
            example_dir: linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: fbqueue.exe
            asset_name: fbqueue-windows-x64.zip
            example_dir: windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup update stable

      - name: Build
        run: cargo build --release

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir dist
          cp target/release/${{ matrix.artifact_name }} .
          tar -czvf dist/${{ matrix.asset_name }} \
            ${{ matrix.artifact_name }} \
            README.md \
            examples/${{ matrix.example_dir }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist
          Copy-Item "target\release\fbqueue.exe" .
          Compress-Archive -Path "fbqueue.exe", "README.md", "examples\windows" -DestinationPath "dist\${{ matrix.asset_name }}"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: dist/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}